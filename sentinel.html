<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel-2 Time Series | CG Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/styles.css" />
    <style>
        :root {
            --primary: #7a5530;
            --bg-creme: #FEFBE3;
            --border: #CFD8B3;
            --accent: #CD9C69;
        }

        #search-box {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: 90%;
            max-width: 500px;
            display: flex;
            gap: 10px;
        }

        #search-box input {
            flex: 1;
            padding: 10px 20px;
            border-radius: 25px;
            border: 1px solid var(--border);
            background: var(--bg-creme);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-family: inherit;
            font-size: 13px;
            outline: none;
        }

        #time-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(254, 251, 227, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 8px 24px;
            width: auto;
            min-width: 600px;
            max-width: 95%;
            box-shadow: 0 8px 32px rgba(130, 100, 60, 0.15);
            color: var(--primary);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .compact-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .timeline-header {
            margin-bottom: 0;
            gap: 12px;
        }

        .date-display {
            font-weight: 800;
            font-size: 13px;
            white-space: nowrap;
        }

        .stats {
            font-size: 9px;
            display: none; /* Hide on compact */
        }

        .play-btn {
            width: 32px;
            height: 32px;
            font-size: 14px;
            flex-shrink: 0;
        }

        input[type="range"] {
            flex-grow: 1;
            height: 4px;
        }

        .settings-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            border-top: 1px solid rgba(207, 216, 179, 0.3);
            padding-top: 4px;
        }

        .settings-row input, .settings-row select {
            background: transparent;
            border: none;
            font-size: 10px;
            color: var(--primary);
            font-weight: 600;
            padding: 2px;
            cursor: pointer;
        }

        .divider {
            width: 1px;
            height: 12px;
            background: var(--border);
        }

        /* Responsive */
        @media (max-width: 768px) {
            #time-panel { 
                min-width: 90%; 
                border-radius: 20px;
                padding: 10px;
            }
            .settings-row { flex-wrap: wrap; justify-content: center; }
        }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <div id="loading-overlay">Scanning...</div>

    <div id="search-box">
        <input type="text" id="location-input" placeholder="Search location...">
        <button onclick="handleSearch()" style="background: var(--primary); color: white; border: none; padding: 0 15px; border-radius: 25px; cursor: pointer; font-weight: 600; font-size: 12px;">Search</button>
    </div>

    <div id="time-panel">
        <!-- Progress Bar -->
        <div id="preload-progress-container" style="display: none; height: 3px; background: rgba(0,0,0,0.1); border-radius: 3px; margin-bottom: 8px; overflow: hidden;">
            <div id="preload-progress-bar" style="width: 0%; height: 100%; background: var(--primary); transition: width 0.3s;"></div>
        </div>

        <div class="compact-row">
            <button class="play-btn" id="play-btn" onclick="togglePlay()">▶</button>
            <div class="date-display" id="current-date">Loading...</div>
            <input type="range" id="time-slider" min="0" max="0" value="0" oninput="handleSliderChange(this.value)">
            <div style="font-size: 10px; font-weight: 800; color: var(--accent); white-space: nowrap;">
                <span id="start-label">--</span> / <span id="end-label">--</span>
            </div>
            <button id="preload-btn" onclick="preloadAll()" style="background: var(--primary); color: white; border: none; padding: 4px 10px; border-radius: 12px; font-size: 9px; font-weight: 800; cursor: pointer; white-space: nowrap;">LOAD ALL</button>
        </div>
        
        <div class="settings-row">
            <input type="date" id="start-date" onchange="fetchImages()">
            <span>to</span>
            <input type="date" id="end-date" onchange="fetchImages()">
            <div class="divider"></div>
            <select id="frequency" onchange="fetchImages()">
                <option value="all">All</option>
                <option value="weekly">Weekly</option>
                <option value="monthly">Monthly</option>
                <option value="yearly">Yearly</option>
            </select>
            <div class="divider"></div>
            <select id="img-type" onchange="fetchImages()">
                <option value="visual">True Color</option>
                <option value="ndvi">NDVI</option>
            </select>
            <div class="divider"></div>
            <a href="index.html" style="text-decoration: none; color: var(--accent); font-weight: 800;">CLOSE</a>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {
            center: [18.58, 81.03],
            zoom: 11,
            zoomControl: false
        });

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© CARTO'
        }).addTo(map);

        let items = [];
        let currentIndex = 0;
        let isPlaying = false;
        let playInterval = null;
        let activeSatelliteLayer = null;
        let preLoadLayers = {};

        // MPC API Helpers
        const STAC_API = 'https://planetarycomputer.microsoft.com/api/stac/v1';
        
        // Set default dates
        document.getElementById('start-date').value = new Date(Date.now() - 365 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
        document.getElementById('end-date').value = new Date().toISOString().split('T')[0];

        async function fetchImages() {
            const bounds = map.getBounds();
            const bbox = [bounds.getWest(), bounds.getSouth(), bounds.getEast(), bounds.getNorth()];
            const startDate = document.getElementById('start-date').value;
            const endDate = document.getElementById('end-date').value;
            const freq = document.getElementById('frequency').value;
            
            document.getElementById('loading-overlay').style.display = 'block';

            try {
                const response = await fetch(`${STAC_API}/search`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        collections: ['sentinel-2-l2a'],
                        bbox: bbox,
                        datetime: `${startDate}/${endDate}`,
                        limit: 1000, // Maximum allowed limit to cover full 2015-2026 range
                        sortby: [{ field: 'properties.datetime', direction: 'asc' }]
                    })
                });

                const data = await response.json();
                let rawItems = data.features;

                // Frequency filtering
                if (freq === 'all') {
                    items = rawItems;
                } else {
                    items = [];
                    const seen = new Set();
                    rawItems.forEach(item => {
                        const date = new Date(item.properties.datetime);
                        let key;
                        if (freq === 'weekly') {
                            const start = new Date(date.getFullYear(), 0, 1);
                            const week = Math.ceil((((date - start) / 86400000) + start.getDay() + 1) / 7);
                            key = `${date.getFullYear()}-W${week}`;
                        } else if (freq === 'monthly') {
                            key = `${date.getFullYear()}-${date.getMonth()}`;
                        } else if (freq === 'yearly') {
                            key = `${date.getFullYear()}`;
                        }
                        
                        if (!seen.has(key)) {
                            items.push(item);
                            seen.add(key);
                        }
                    });
                }
                
                const slider = document.getElementById('time-slider');
                if (items.length > 0) {
                    slider.disabled = false;
                    slider.max = items.length - 1;
                    currentIndex = items.length - 1;
                    slider.value = currentIndex;
                    updateUI();
                    renderActiveLayer();
                } else {
                    slider.disabled = true;
                    slider.max = 0;
                    slider.value = 0;
                    document.getElementById('current-date').textContent = "No images found";
                }
            } catch (e) {
                console.error("Fetch failed", e);
            } finally {
                document.getElementById('loading-overlay').style.display = 'none';
            }
        }

        function getTileUrl(itemId) {
            const type = document.getElementById('img-type').value;
            return `https://planetarycomputer.microsoft.com/api/data/v1/item/tiles/WebMercatorQuad/{z}/{x}/{y}@1x?collection=sentinel-2-l2a&item=${itemId}&assets=${type}`;
        }

        function renderActiveLayer() {
            if (activeSatelliteLayer) map.removeLayer(activeSatelliteLayer);
            
            const item = items[currentIndex];
            if (!item) return;

            activeSatelliteLayer = L.tileLayer(getTileUrl(item.id), {
                zIndex: 100,
                opacity: 1
            }).addTo(map);

            // Pre-load neighbors
            [currentIndex - 1, currentIndex + 1].forEach(idx => {
                if (items[idx]) {
                    if (preLoadLayers[items[idx].id]) return;
                    preLoadLayers[items[idx].id] = L.tileLayer(getTileUrl(items[idx].id), {
                        opacity: 0.01,
                        zIndex: 1
                    }).addTo(map);
                }
            });
        }

        function updateUI() {
            const slider = document.getElementById('time-slider');
            if (!items || items.length === 0) return;
            
            slider.max = items.length - 1;
            slider.value = currentIndex;

            const current = items[currentIndex];
            if (!current) return;
            
            const date = new Date(current.properties.datetime);
            
            const dateEl = document.getElementById('current-date');
            if (dateEl) {
                dateEl.textContent = date.toLocaleDateString('en-GB', { 
                    day: 'numeric', month: 'long', year: 'numeric' 
                });
            }
            
            const startEl = document.getElementById('start-label');
            const endEl = document.getElementById('end-label');
            if (startEl && items[0]) startEl.textContent = new Date(items[0].properties.datetime).getFullYear();
            if (endEl && items[items.length-1]) endEl.textContent = new Date(items[items.length-1].properties.datetime).getFullYear();
        }

        function handleSliderChange(val) {
            currentIndex = parseInt(val);
            updateUI();
            renderActiveLayer();
        }

        function togglePlay() {
            isPlaying = !isPlaying;
            const btn = document.getElementById('play-btn');
            if (isPlaying) {
                btn.textContent = '⏸';
                playInterval = setInterval(() => {
                    currentIndex = (currentIndex + 1) % items.length;
                    updateUI();
                    renderActiveLayer();
                }, 2000);
            } else {
                btn.textContent = '▶';
                clearInterval(playInterval);
            }
        }

        async function handleSearch() {
            const query = document.getElementById('location-input').value;
            if (!query) return;

            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
            const data = await res.json();
            if (data.length > 0) {
                map.setView([data[0].lat, data[0].lon], 12);
                setTimeout(fetchImages, 500);
            }
        }

        async function preloadAll() {
            if (items.length === 0) return;
            
            const btn = document.getElementById('preload-btn');
            const progressContainer = document.getElementById('preload-progress-container');
            const progressBar = document.getElementById('preload-progress-bar');
            
            btn.disabled = true;
            btn.textContent = 'LOADING...';
            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';

            let loadedCount = 0;
            const total = items.length;

            for (const item of items) {
                if (preLoadLayers[item.id]) {
                    loadedCount++;
                    progressBar.style.width = `${(loadedCount / total) * 100}%`;
                    continue;
                }

                await new Promise((resolve) => {
                    const layer = L.tileLayer(getTileUrl(item.id), {
                        opacity: 0.01,
                        zIndex: 1
                    });
                    
                    layer.on('load', () => {
                        loadedCount++;
                        progressBar.style.width = `${(loadedCount / total) * 100}%`;
                        resolve();
                    });

                    layer.on('tileerror', () => {
                        // Resolve anyway to keep progress moving
                        loadedCount++;
                        progressBar.style.width = `${(loadedCount / total) * 100}%`;
                        resolve();
                    });

                    preLoadLayers[item.id] = layer;
                    layer.addTo(map);
                });
            }

            btn.textContent = 'READY';
            setTimeout(() => {
                progressContainer.style.display = 'none';
                btn.disabled = false;
                btn.textContent = 'LOAD ALL';
            }, 2000);
        }

        map.on('moveend', () => {
            // Clear cache on move to prevent memory leak and force new load for new view
            Object.values(preLoadLayers).forEach(l => map.removeLayer(l));
            preLoadLayers = {};
            fetchImages();
        });
        fetchImages();
    </script>
</body>
</html>
