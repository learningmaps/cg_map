<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel-2 Time Series | CG Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/styles.css" />
    <style>
        #time-panel {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 1000;
            background: #FEFBE3;
            border: 1px solid #CFD8B3;
            border-radius: 10px;
            padding: 15px;
            width: 250px;
            box-shadow: 0 4px 20px rgba(130, 100, 60, 0.14);
        }
        .panel-title {
            font-size: 12px;
            font-weight: 700;
            color: #5c3d18;
            text-transform: uppercase;
            margin-bottom: 12px;
            display: block;
            border-bottom: 1px solid #CFD8B3;
            padding-bottom: 8px;
        }
        .control-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 11px;
            color: #8a7050;
            margin-bottom: 5px;
            font-weight: 600;
        }
        input[type="date"], select {
            width: 100%;
            padding: 8px;
            border: 1px solid #CFD8B3;
            border-radius: 5px;
            background: #fff;
        }
        .back-link {
            display: inline-block;
            margin-top: 10px;
            font-size: 11px;
            color: #CD9C69;
            text-decoration: none;
            font-weight: 600;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div id="map"></div>

    <div id="map-title">
        <h1>Satellite Time Series</h1>
        <p>Sentinel-2 · Monitoring</p>
        <a href="index.html" style="font-size: 10px; color: #CD9C69; text-decoration: none; pointer-events: auto;">← Back to Mining Map</a>
    </div>

    <div id="time-panel">
        <span class="panel-title">Controls</span>
        
        <div class="control-group">
            <label>Observation Date</label>
            <input type="date" id="obs-date" value="2024-04-01" onchange="updateMap()">
        </div>

        <div class="control-group">
            <label>Imagery Type</label>
            <select id="img-type" onchange="updateMap()">
                <option value="TRUE-COLOR-L2A">True Color (Visual)</option>
                <option value="NDVI">NDVI (Vegetation Index)</option>
                <option value="FALSE-COLOR">False Color (Urban/Mining)</option>
            </select>
        </div>

        <div class="control-group">
            <label>Max Cloud Cover: <span id="cloud-val">20%</span></label>
            <input type="range" id="cloud-range" min="0" max="100" value="20" style="width:100%" oninput="updateCloudLabel(this.value)" onchange="updateMap()">
        </div>

        <a href="index.html" class="back-link">Return to Main Map</a>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const INSTANCE_ID = '7500a2dd-df9e-4d42-91a9-be4701c57019';
        
        const map = L.map('map', {
            center: [18.58, 81.03],
            zoom: 10,
            zoomControl: false
        });

        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: '© Esri'
        }).addTo(map);

        let sentinelLayer = null;

        function updateMap() {
            const date = document.getElementById('obs-date').value;
            const type = document.getElementById('img-type').value;
            const cloud = document.getElementById('cloud-range').value;

            if (sentinelLayer) map.removeLayer(sentinelLayer);

            sentinelLayer = L.tileLayer.wms(`https://sh.dataspace.copernicus.eu/ogc/wms/${INSTANCE_ID}`, {
                layers: type,
                format: 'image/png',
                transparent: true,
                version: '1.3.0',
                time: date,
                maxcc: cloud,
                attribution: '© Copernicus'
            }).addTo(map);
        }

        function updateCloudLabel(val) {
            document.getElementById('cloud-val').textContent = val + '%';
        }

        updateMap();
    </script>
</body>
</html>
